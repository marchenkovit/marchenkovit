name: Metrics
on:
  schedule: [{ cron: "0 0 * * 0" }]
  workflow_dispatch:
  push: { branches: ["main"] }

concurrency:
  group: github-metrics
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories
          base_indepth: true
          plugin_languages: yes
          plugin_languages_ignored: Smarty
          config_order: base.header, base.activity, base.community, base.repositories
          repositories_skipped: ""
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: marchenko.vitaliy1@gmail.com
          plugin_languages_indepth: yes
