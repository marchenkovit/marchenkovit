<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Fira Code', 'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <linearGradient id="tBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8fa"/>
    </linearGradient>
    <linearGradient id="timelineLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="33%" stop-color="#2563eb"/>
      <stop offset="66%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="nodeGlow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow4" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridT" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0284c7" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#tBg)"/>
  <rect width="1200" height="900" fill="url(#gridT)"/>

  <!-- Header -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0s" fill="freeze"/>
    <text x="600" y="60" text-anchor="middle" fill="#0f172a" font-size="28" font-weight="800" letter-spacing="4">
      CAREER TIMELINE
    </text>
    <text x="600" y="90" text-anchor="middle" fill="#64748b" font-size="15" letter-spacing="6">
      · 11+ YEARS IN INFRASTRUCTURE ·
    </text>
  </g>

  <!-- Vertical timeline line -->
  <rect x="178" y="150" width="4" height="640" rx="2" fill="url(#timelineLine)" opacity="0.7"/>

  <!-- Animated pulse flowing down timeline line -->
  <circle cx="180" cy="150" r="5" fill="#0f172a" opacity="0">
    <animate attributeName="cy" values="150;790" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- ============ 2014: SysAdmin ============ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>

    <!-- Glow halo -->
    <circle cx="180" cy="215" r="46" fill="url(#nodeGlow1)">
      <animate attributeName="r" values="44;52;44" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Year badge -->
    <rect x="32" y="195" width="100" height="40" rx="20" fill="#ffffff" stroke="#0284c7" stroke-width="2.5" filter="url(#cardShadow)"/>
    <text x="82" y="221" text-anchor="middle" fill="#0284c7" font-size="18" font-weight="800" letter-spacing="2">2014</text>

    <!-- Node dot -->
    <circle cx="180" cy="215" r="11" fill="#ffffff" stroke="#0284c7" stroke-width="3.5"/>
    <circle cx="180" cy="215" r="5" fill="#0284c7">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Content card -->
    <g transform="translate(220, 165)">
      <rect x="0" y="0" width="860" height="104" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" stroke-opacity="0.35" filter="url(#cardShadow)"/>

      <!-- Title row -->
      <text x="24" y="42" font-size="28" font-weight="800">🖥️</text>
      <text x="62" y="42" font-size="22" fill="#0f172a" font-weight="700">SysAdmin</text>
      <text x="62" y="68" font-size="15" fill="#64748b" letter-spacing="2" font-weight="600">·  STARTING OUT</text>

      <!-- Bullets -->
      <text x="380" y="42" font-size="17" fill="#334155">
        <tspan fill="#16a34a" font-weight="bold">›</tspan>  Hundreds of VPS under management
      </text>
      <text x="380" y="72" font-size="17" fill="#334155">
        <tspan fill="#16a34a" font-weight="bold">›</tspan>  Linux hardening · mail · DNS · web
      </text>
    </g>
  </g>

  <!-- ============ 2017: Senior SysAdmin ============ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.9s" fill="freeze"/>

    <circle cx="180" cy="385" r="46" fill="url(#nodeGlow2)">
      <animate attributeName="r" values="44;52;44" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>

    <rect x="32" y="365" width="100" height="40" rx="20" fill="#ffffff" stroke="#2563eb" stroke-width="2.5" filter="url(#cardShadow)"/>
    <text x="82" y="391" text-anchor="middle" fill="#2563eb" font-size="18" font-weight="800" letter-spacing="2">2017</text>

    <circle cx="180" cy="385" r="11" fill="#ffffff" stroke="#2563eb" stroke-width="3.5"/>
    <circle cx="180" cy="385" r="5" fill="#2563eb">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>

    <g transform="translate(220, 335)">
      <rect x="0" y="0" width="860" height="104" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.35" filter="url(#cardShadow)"/>

      <text x="24" y="42" font-size="28" font-weight="800">🛠️</text>
      <text x="62" y="42" font-size="22" fill="#0f172a" font-weight="700">Senior SysAdmin</text>
      <text x="62" y="68" font-size="15" fill="#64748b" letter-spacing="2" font-weight="600">·  SCALE GROWS</text>

      <text x="380" y="42" font-size="17" fill="#334155">
        <tspan fill="#d97706" font-weight="bold">30,000+</tspan> VPS under management
      </text>
      <text x="380" y="72" font-size="17" fill="#334155">
        <tspan fill="#d97706" font-weight="bold">5,000+</tspan> bare-metal servers across multiple DCs
      </text>
    </g>
  </g>

  <!-- ============ 2020: DevOps ============ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>

    <circle cx="180" cy="555" r="46" fill="url(#nodeGlow3)">
      <animate attributeName="r" values="44;52;44" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>

    <rect x="32" y="535" width="100" height="40" rx="20" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5" filter="url(#cardShadow)"/>
    <text x="82" y="561" text-anchor="middle" fill="#7c3aed" font-size="18" font-weight="800" letter-spacing="2">2020</text>

    <circle cx="180" cy="555" r="11" fill="#ffffff" stroke="#7c3aed" stroke-width="3.5"/>
    <circle cx="180" cy="555" r="5" fill="#7c3aed">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>

    <g transform="translate(220, 495)">
      <rect x="0" y="0" width="860" height="128" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.35" filter="url(#cardShadow)"/>

      <text x="24" y="42" font-size="28" font-weight="800">🤖</text>
      <text x="62" y="42" font-size="22" fill="#0f172a" font-weight="700">DevOps Engineer</text>
      <text x="62" y="68" font-size="15" fill="#64748b" letter-spacing="2" font-weight="600">·  AUTOMATION ERA</text>

      <text x="380" y="42" font-size="17" fill="#334155">
        <tspan fill="#16a34a" font-weight="bold">›</tspan>  Infrastructure-as-Code with <tspan fill="#7c3aed" font-weight="bold">Terraform</tspan>
      </text>
      <text x="380" y="72" font-size="17" fill="#334155">
        <tspan fill="#16a34a" font-weight="bold">›</tspan>  Config management: <tspan fill="#dc2626" font-weight="bold">Ansible</tspan> + <tspan fill="#ea580c" font-weight="bold">Chef</tspan>
      </text>
      <text x="380" y="102" font-size="17" fill="#334155">
        <tspan fill="#16a34a" font-weight="bold">›</tspan>  CI/CD pipelines · immutable infrastructure
      </text>
    </g>
  </g>

  <!-- ============ 2026: SRE (current) ============ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2.1s" fill="freeze"/>

    <!-- Pulsing "NOW" halo -->
    <circle cx="180" cy="755" r="52" fill="url(#nodeGlow4)">
      <animate attributeName="r" values="48;60;48" dur="2s" repeatCount="indefinite"/>
    </circle>

    <rect x="32" y="735" width="100" height="40" rx="20" fill="#16a34a" stroke="#15803d" stroke-width="2.5" filter="url(#cardShadow)">
      <animate attributeName="fill-opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="82" y="761" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800" letter-spacing="2">2026</text>

    <circle cx="180" cy="755" r="13" fill="#16a34a" stroke="#15803d" stroke-width="3.5">
      <animate attributeName="r" values="11;15;11" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="755" r="6" fill="#ffffff"/>

    <g transform="translate(220, 680)">
      <rect x="0" y="0" width="860" height="150" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2" stroke-opacity="0.6" filter="url(#cardShadow)"/>

      <!-- "CURRENT" badge top-right -->
      <rect x="744" y="14" width="96" height="28" rx="14" fill="#16a34a"/>
      <text x="792" y="33" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="800" letter-spacing="3">CURRENT</text>

      <!-- Title / subtitle (own row, full width) -->
      <text x="24" y="42" font-size="28" font-weight="800">🚀</text>
      <text x="62" y="42" font-size="22" fill="#0f172a" font-weight="700">Site Reliability Engineer</text>
      <text x="62" y="68" font-size="15" fill="#64748b" letter-spacing="2" font-weight="600">·  MODERN CLOUD-NATIVE</text>

      <!-- Bullets — own rows below title, full width -->
      <text x="24" y="102" font-size="17" fill="#334155">
        <tspan fill="#16a34a" font-weight="bold">›</tspan>  Multi-region <tspan fill="#d97706" font-weight="bold">AWS</tspan> · <tspan fill="#d97706" font-weight="bold">6 clusters</tspan> · 5 continents
      </text>
      <text x="24" y="132" font-size="17" fill="#334155">
        <tspan fill="#16a34a" font-weight="bold">›</tspan>  <tspan fill="#2563eb" font-weight="bold">Kubernetes</tspan>-native · GitOps · SLO-driven operations
      </text>
    </g>
  </g>

  <!-- Footer tags -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2.7s" fill="freeze"/>
    <text x="600" y="880" text-anchor="middle" font-size="15" fill="#475569" letter-spacing="4" font-weight="700">
      HUNDREDS  →  TENS OF THOUSANDS  →  HUNDREDS OF THOUSANDS OF SERVERS
    </text>
  </g>
</svg>
