<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="14">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Window -->
  <rect width="900" height="500" rx="12" ry="12" fill="url(#bg)" stroke="#414868" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="32" rx="12" ry="12" fill="#24283b"/>
  <rect x="0" y="16" width="900" height="16" fill="#24283b"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#f7768e"/>
  <circle cx="42" cy="16" r="6" fill="#e0af68"/>
  <circle cx="64" cy="16" r="6" fill="#9ece6a"/>

  <!-- Title -->
  <text x="450" y="21" fill="#a9b1d6" text-anchor="middle" font-size="12" opacity="0.7">marchenko@devops-workstation: ~</text>

  <!-- Terminal content -->
  <g transform="translate(20, 60)">
    <!-- Line 1: prompt -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
      <text x="0" y="0" fill="#9ece6a">➜</text>
      <text x="20" y="0" fill="#7dcfff" font-weight="bold">~/k8s</text>
      <text x="80" y="0" fill="#bb9af7">git:(</text>
      <text x="115" y="0" fill="#f7768e">main</text>
      <text x="150" y="0" fill="#bb9af7">)</text>
      <text x="165" y="0" fill="#c0caf5">$ kubectl apply -f deployment.yaml</text>
    </g>

    <!-- Line 2: output -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
      <text x="0" y="25" fill="#9ece6a">✓</text>
      <text x="20" y="25" fill="#a9b1d6">deployment.apps/app-api </text>
      <text x="290" y="25" fill="#7dcfff">created</text>
    </g>

    <!-- Line 3 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
      <text x="0" y="50" fill="#9ece6a">✓</text>
      <text x="20" y="50" fill="#a9b1d6">service/app-api </text>
      <text x="200" y="50" fill="#7dcfff">created</text>
    </g>

    <!-- Line 4 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.6s" fill="freeze"/>
      <text x="0" y="75" fill="#9ece6a">✓</text>
      <text x="20" y="75" fill="#a9b1d6">ingress.networking.k8s.io/app-api </text>
      <text x="360" y="75" fill="#7dcfff">created</text>
    </g>

    <!-- Line 5: next command -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.5s" fill="freeze"/>
      <text x="0" y="110" fill="#9ece6a">➜</text>
      <text x="20" y="110" fill="#7dcfff" font-weight="bold">~/k8s</text>
      <text x="80" y="110" fill="#c0caf5">$ kubectl get pods -n production</text>
    </g>

    <!-- Header -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.5s" fill="freeze"/>
      <text x="0" y="140" fill="#565f89" font-weight="bold">NAME                           READY   STATUS    RESTARTS   AGE</text>
    </g>

    <!-- Pod 1 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.9s" fill="freeze"/>
      <text x="0" y="165" fill="#c0caf5">app-api-7d9b4f8c5-k2m8n</text>
      <text x="300" y="165" fill="#9ece6a">3/3</text>
      <text x="360" y="165" fill="#9ece6a" filter="url(#glow)">Running</text>
      <text x="460" y="165" fill="#a9b1d6">0</text>
      <text x="540" y="165" fill="#a9b1d6">12d</text>
    </g>

    <!-- Pod 2 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.1s" fill="freeze"/>
      <text x="0" y="185" fill="#c0caf5">app-api-7d9b4f8c5-p4q7r</text>
      <text x="300" y="185" fill="#9ece6a">3/3</text>
      <text x="360" y="185" fill="#9ece6a" filter="url(#glow)">Running</text>
      <text x="460" y="185" fill="#a9b1d6">0</text>
      <text x="540" y="185" fill="#a9b1d6">12d</text>
    </g>

    <!-- Pod 3 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.3s" fill="freeze"/>
      <text x="0" y="205" fill="#c0caf5">redis-master-0</text>
      <text x="300" y="205" fill="#9ece6a">1/1</text>
      <text x="360" y="205" fill="#9ece6a" filter="url(#glow)">Running</text>
      <text x="460" y="205" fill="#a9b1d6">0</text>
      <text x="540" y="205" fill="#a9b1d6">45d</text>
    </g>

    <!-- Pod 4 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.5s" fill="freeze"/>
      <text x="0" y="225" fill="#c0caf5">postgres-primary-0</text>
      <text x="300" y="225" fill="#9ece6a">1/1</text>
      <text x="360" y="225" fill="#9ece6a" filter="url(#glow)">Running</text>
      <text x="460" y="225" fill="#a9b1d6">0</text>
      <text x="540" y="225" fill="#a9b1d6">90d</text>
    </g>

    <!-- terraform command -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.5s" fill="freeze"/>
      <text x="0" y="260" fill="#9ece6a">➜</text>
      <text x="20" y="260" fill="#7dcfff" font-weight="bold">~/infra</text>
      <text x="95" y="260" fill="#c0caf5">$ terraform apply -auto-approve</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.3s" fill="freeze"/>
      <text x="0" y="285" fill="#bb9af7">Apply complete!</text>
      <text x="130" y="285" fill="#a9b1d6">Resources:</text>
      <text x="220" y="285" fill="#9ece6a" font-weight="bold">42 added</text>
      <text x="300" y="285" fill="#a9b1d6">,</text>
      <text x="310" y="285" fill="#e0af68" font-weight="bold">0 changed</text>
      <text x="390" y="285" fill="#a9b1d6">,</text>
      <text x="400" y="285" fill="#f7768e" font-weight="bold">0 destroyed</text>
      <text x="485" y="285" fill="#a9b1d6">.</text>
    </g>

    <!-- Status line -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="8.2s" fill="freeze"/>
      <text x="0" y="320" fill="#9ece6a">➜</text>
      <text x="20" y="320" fill="#7dcfff" font-weight="bold">~/infra</text>
      <text x="95" y="320" fill="#c0caf5">$ echo "Infrastructure ready ✨"</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="8.8s" fill="freeze"/>
      <text x="0" y="345" fill="#e0af68">Infrastructure ready ✨</text>
    </g>

    <!-- Blinking cursor -->
    <g>
      <animate attributeName="opacity" values="0;0;1" dur="9s" begin="0s" fill="freeze"/>
      <text x="0" y="380" fill="#9ece6a">➜</text>
      <text x="20" y="380" fill="#7dcfff" font-weight="bold">~/infra</text>
      <text x="95" y="380" fill="#c0caf5">$ </text>
      <rect x="110" y="368" width="9" height="16" fill="#c0caf5">
        <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
