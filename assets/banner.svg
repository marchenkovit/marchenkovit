<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="'Fira Code', 'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8fa"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="33%" stop-color="#2563eb"/>
      <stop offset="66%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0"/>
      <stop offset="33%" stop-color="#2563eb" stop-opacity="0.9"/>
      <stop offset="66%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="statGlow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="statGlow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="statGlow3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="statGlow4" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0284c7" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#bg)"/>
  <rect width="1200" height="380" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Bottom accent line -->
  <rect x="0" y="377" width="1200" height="3" fill="url(#accent)">
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Left vertical accent -->
  <line x1="60" y1="70" x2="60" y2="290" stroke="url(#nameGrad)" stroke-width="3" opacity="0.7"/>
  <circle cx="60" cy="70" r="6" fill="#0284c7">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="290" r="6" fill="#16a34a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Header label -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0s" fill="freeze"/>
    <text x="90" y="78" fill="#64748b" font-size="13" font-weight="600" letter-spacing="6">PROFILE</text>
  </g>

  <!-- Name -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.2s" fill="freeze"/>
    <text x="90" y="150" fill="url(#nameGrad)" font-size="60" font-weight="800" letter-spacing="-1">
      Vitalii Marchenko
    </text>
  </g>

  <!-- Role -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.6s" fill="freeze"/>
    <text x="90" y="188" fill="#334155" font-size="20" font-weight="600" letter-spacing="4">
      SITE RELIABILITY ENGINEER
    </text>
    <text x="508" y="188" fill="#64748b" font-size="20" letter-spacing="3">·</text>
    <text x="528" y="188" fill="#334155" font-size="20" font-weight="600" letter-spacing="4">DEVOPS</text>
    <text x="648" y="188" fill="#64748b" font-size="20" letter-spacing="3">·</text>
    <text x="668" y="188" fill="#334155" font-size="20" font-weight="600" letter-spacing="4">11+ YEARS</text>
  </g>

  <!-- Stat cards -->
  <g transform="translate(90, 220)">

    <!-- Stat 1: 100K+ VPS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/>
      <circle cx="105" cy="40" r="52" fill="url(#statGlow1)">
        <animate attributeName="r" values="50;58;50" dur="3s" repeatCount="indefinite"/>
      </circle>
      <rect x="0" y="0" width="210" height="80" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" stroke-opacity="0.4" filter="url(#cardShadow)"/>
      <text x="105" y="40" fill="#0284c7" font-size="30" font-weight="800" text-anchor="middle">100,000+</text>
      <text x="105" y="63" fill="#64748b" font-size="11" text-anchor="middle" letter-spacing="3" font-weight="600">VPS MANAGED</text>
    </g>

    <!-- Stat 2: 10K+ Dedicated -->
    <g transform="translate(230, 0)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
      <circle cx="105" cy="40" r="52" fill="url(#statGlow2)">
        <animate attributeName="r" values="50;58;50" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <rect x="0" y="0" width="210" height="80" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.4" filter="url(#cardShadow)"/>
      <text x="105" y="40" fill="#2563eb" font-size="30" font-weight="800" text-anchor="middle">10,000+</text>
      <text x="105" y="63" fill="#64748b" font-size="11" text-anchor="middle" letter-spacing="3" font-weight="600">DEDICATED SERVERS</text>
    </g>

    <!-- Stat 3: 99.9% Uptime -->
    <g transform="translate(460, 0)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.4s" fill="freeze"/>
      <circle cx="105" cy="40" r="52" fill="url(#statGlow3)">
        <animate attributeName="r" values="50;58;50" dur="3s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <rect x="0" y="0" width="210" height="80" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" stroke-opacity="0.5" filter="url(#cardShadow)"/>
      <text x="105" y="40" fill="#16a34a" font-size="30" font-weight="800" text-anchor="middle">99.9%+</text>
      <text x="105" y="63" fill="#64748b" font-size="11" text-anchor="middle" letter-spacing="3" font-weight="600">UPTIME SLA</text>
    </g>

    <!-- Stat 4: Multi-region -->
    <g transform="translate(690, 0)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.6s" fill="freeze"/>
      <circle cx="105" cy="40" r="52" fill="url(#statGlow4)">
        <animate attributeName="r" values="50;58;50" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <rect x="0" y="0" width="210" height="80" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.4" filter="url(#cardShadow)"/>
      <text x="105" y="40" fill="#7c3aed" font-size="30" font-weight="800" text-anchor="middle">6</text>
      <text x="105" y="63" fill="#64748b" font-size="11" text-anchor="middle" letter-spacing="3" font-weight="600">AWS REGIONS OPERATED</text>
    </g>

  </g>

  <!-- Bottom tags -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2s" fill="freeze"/>
    <text x="600" y="350" text-anchor="middle" font-size="16" fill="#334155" letter-spacing="3" font-weight="700">
      AWS  ·  KUBERNETES  ·  TERRAFORM  ·  ANSIBLE  ·  CHEF  ·  MULTI-REGION  ·  HIGH-LOAD  ·  AUTOMATION
    </text>
  </g>
</svg>
